<VirtualHost *:80>
    ServerName example.com
    ServerAlias www.example.com
    DocumentRoot "/var/www/opportunetmondiale/public"

    <Directory "/var/www/opportunetmondiale/public">
        AllowOverride All
        Require all granted
        Options FollowSymLinks
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/opportunetmondiale-error.log
    CustomLog ${APACHE_LOG_DIR}/opportunetmondiale-access.log combined
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName example.com
    ServerAlias www.example.com
    DocumentRoot "/var/www/opportunetmondiale/public"

    <Directory "/var/www/opportunetmondiale/public">
        AllowOverride All
        Require all granted
        Options FollowSymLinks
    </Directory>

    SSLEngine on
    SSLCertificateFile /path/to/fullchain.pem
    SSLCertificateKeyFile /path/to/privkey.pem

    ErrorLog ${APACHE_LOG_DIR}/opportunetmondiale-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/opportunetmondiale-ssl-access.log combined
</VirtualHost>
</IfModule>
